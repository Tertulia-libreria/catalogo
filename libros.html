<!-- Favicon (si lo tienes) -->


<style>
<link rel="icon" href="favicon.ico">

#categoria option[value="pdf"]{
font-weight:700;
color:#0d47a1;
}

/* ===== Barra promocional fija correcta ===== */
#barraPromo{
  position:fixed;
  top:60px;   /* ajusta si necesitas */
  left:0;
  width:100%;
  background:#FFE082;
  color:#333;
  text-align:center;
  font-weight:600;
  font-size:14px;
  padding:8px 10px;
  z-index:999;
}


#mensajePromo{
  display:inline-block;
  transition:opacity .4s ease;
}

  body{
  margin:0;
  font-family:Arial;
  background:#f2f6ff;
  padding-top:115px;  /* suma de ambas */
  padding-bottom:120px;
}


  #barra{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  box-sizing: border-box;
  background:#0d47a1;
  padding:12px 20px;
  z-index:1000;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

  #titulo{font-weight:600;font-size:20px;color:#fff;margin:0;}
  #categoria,#buscador{box-sizing:border-box;width:100%;max-width:520px;padding:10px;border-radius:8px;border:none;font-size:15px;display:block;}
  #categoria,#buscador{background:#fff;}

  .catalogo{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;padding:12px;min-height:300px;}
  .producto{background:white;border-radius:12px;padding:10px;position:relative;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,0.06);transition:all .3s ease;}
  .producto img{width:100%;max-height:220px;object-fit:contain;border-radius:8px;margin-bottom:8px;}
  .titulo{font-weight:700;margin:0 0 6px;}
  .autor{margin:0 0 8px;color:#333;}
  .precio{color:#0d47a1;font-weight:700;}

  .estado{
  font-size:12px;
  font-weight:600;
  white-space:nowrap;
 }

 .estado.ok{ color:#2e7d32; }
 .estado.no{ color:#c62828; }

  .estrella{
    position:absolute;top:8px;right:8px;width:38px;height:38px;border-radius:50%;
    background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;
    font-size:22px;cursor:pointer;color:#999;transition:.25s;box-shadow:0 2px 6px rgba(0,0,0,.18)
  }
  .estrella.act{color:#FFD700}
/* ===== EFECTO FAVORITOS PRO ===== */

.estrella {
  transition: transform .18s ease, box-shadow .18s ease;
}

.estrella.act {
  box-shadow: 0 0 12px rgba(255, 215, 0, .6);
  animation: starPulse .6s ease;
}

@keyframes starPulse {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.25); }
  100% { transform: scale(1); }
}

/* contenedor invisible */
.stars-container {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 38px;
  height: 38px;
  pointer-events: none;
  overflow: visible;
}

/* estrellitas */
.tiny-star {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 6px;
  height: 6px;
  background: #FFD700;
  transform: translate(-50%, -50%);
  clip-path: polygon(
    50% 0%, 61% 35%, 98% 35%, 
    68% 57%, 79% 91%, 
    50% 70%, 21% 91%, 
    32% 57%, 2% 35%, 39% 35%
  );
  animation: starExplosion .9s ease-out forwards;
}
@keyframes starExplosion {
  0% {
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
  }
  30% {
    transform: translate(-50%, -50%) scale(1.2);
    opacity: 1;
  }
  100% {
    transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y)))
               scale(0) rotate(360deg);
    opacity: 0;
  }
}

  .botones-flotantes{position:fixed;bottom:20px;right:15px;display:flex;flex-direction:column;gap:10px;z-index:998}
  #favoritosBtn,#volverBtn,#whatsapp{
    border:none;border-radius:50%;width:50px;height:50px;font-size:20px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    box-shadow:0 4px 12px rgba(0,0,0,.25)
  }
  #favoritosBtn,#volverBtn{background:#0d47a1;color:#fff}
  #volverBtn{display:none}
  #whatsapp{background:#25D366;color:white;text-decoration:none}

  .paginacion{display:flex;justify-content:center;gap:6px;margin:15px;flex-wrap:wrap}
  .paginacion button{padding:6px 12px;border-radius:4px;border:1px solid #ccc;background:white;cursor:pointer}
  .paginacion button.active{background:#0d47a1;color:white}
  
#valentinBtn{
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  background:linear-gradient(45deg,#0d47a1,#1565c0);
  color:white;
  border:none;
  padding:14px 28px;
  font-size:16px;
  font-weight:700;
  border-radius:40px;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
  display:none;
  cursor:pointer;
  z-index:999;
  animation:pulseBtn 2s infinite;
}

@keyframes pulseBtn{
  0%{transform:translateX(-50%) scale(1)}
  50%{transform:translateX(-50%) scale(1.05)}
  100%{transform:translateX(-50%) scale(1)}
}
@keyframes pulse{
  0%{transform:translateX(-50%) scale(1)}
  50%{transform:translateX(-50%) scale(1.08)}
  100%{transform:translateX(-50%) scale(1)}
}

  @media(min-width:700px){
    #barra{flex-direction:row;justify-content:space-between}
    #titulo{width:25%}
    #categoria,#buscador{width:35%}
}

/* ===== SKELETON LOADER ===== */
.skeleton {
  background: white;
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  animation: skeletonPulse 1.2s infinite ease-in-out;
}

.skeleton .img {
  width: 100%;
  height: 200px;
  background: #e0e0e0;
  border-radius: 8px;
  margin-bottom: 10px;
}

.skeleton .line {
  height: 14px;
  background: #e0e0e0;
  border-radius: 6px;
  margin-bottom: 8px;
}

.skeleton .line.short {
  width: 60%;
}

@keyframes skeletonPulse {
  0% { opacity: .5 }
  50% { opacity: .85 }
  100% { opacity: .5 }
}
/* ===== SPINNER DE CARGA ===== */
.loading-box{
  height:200px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
}

.spinner{
  width:36px;
  height:36px;
  border:4px solid #e0e0e0;
  border-top:4px solid #0d47a1;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}
</style>

<body>

<div id="barra">
  <div id="titulo">Tertulia librería</div>
  <select id="categoria">
    <option value="">📂 Todas las categorías</option>
  </select>
  <input id="buscador" placeholder="🔍 Buscar por título o autor">
</div>
<div id="barraPromo">
  <span id="mensajePromo"></span>
</div>

<div class="catalogo" id="catalogo"></div>

<div class="paginacion" id="paginacion">
  <button onclick="cambiarPagina(paginaActual-1)">←</button>
  <span id="contadorPagina"></span>
  <button onclick="cambiarPagina(paginaActual+1)">→</button>
</div>

<div id="contadorCategorias" style="
  text-align:center;
  font-size:14px;
  color:#555;
  margin:15px 0 5px 0;
"></div>
 
<div id="contador-social" style="margin:40px 0 20px 0; display:flex; justify-content:center;">
  <div style="
    background:#ffffff;
    border-radius:14px;
    padding:20px 30px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
    width:100%;
    max-width:420px;
  ">

    <div style="
      text-align:center;
      font-weight:700;
      font-size:15px;
      margin-bottom:14px;
      color:#0d47a1;
    ">
      👀 Usuarios en este momento
    </div>

    <div id="lista-usuarios"></div>

  </div>
</div>

<div class="botones-flotantes">
  <button id="favoritosBtn" onclick="irAFavoritos()">⭐</button>
  <a id="whatsapp" href="https://wa.me/524751070540" target="_blank">💬</a>
  </div>
<button id="valentinBtn" onclick="enviarSolicitud()">
  📚 Quiero estos libros
</button>

<script>
/* ================= CONFIG ================= */
var numero = "524751070540";
var libros = [];
var favs = [];
var librosPorPagina = 40;
var paginaActual = 1;
var librosFiltrados = [];
var todosLibros = [];
var viendoFavs = false;
var productosPendientes = [];
var renderizando = false;
function normalizar(texto){
  return texto
    .toString()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .trim();
}
function guardarEstadoEnURL(){
  const params = new URLSearchParams();

  if (viendoFavs) {
    params.set("favoritos", "1");
  }

  const categoria = document.getElementById("categoria").value;
  if (categoria) {
    params.set("categoria", categoria);
  }

  params.set("pagina", paginaActual);

  const nuevaURL = "?" + params.toString();

  history.pushState(
    { 
      pagina: paginaActual,
      scroll: window.scrollY
    },
    "",
    nuevaURL
  );
}

function obtenerEstadoDesdeURL(){
  const params = new URLSearchParams(window.location.search);

  return {
    favoritos: params.get("favoritos") === "1",
    categoria: params.get("categoria") || "",
    pagina: parseInt(params.get("pagina")) || 1
  };
}

function irAFavoritos(){
  viendoFavs = true;
  paginaActual = 1;
  mostrarFavoritos();
guardarEstadoEnURL(); // 🔥 importante
}



function actualizarURLCategoria(categoria){
  const url = categoria
  ? `?categoria=${encodeURIComponent(categoria)}`
  : window.location.pathname;


  history.pushState({ categoria }, "", url);
}

function actualizarContadorCategorias(){
  const categoria = document.getElementById("categoria").value;
  const total = librosFiltrados.length;

  let texto = "";

  if (viendoFavs) {
    texto = "Favoritos - " + total + " libros";
  } 
  else if (categoria) {
    texto = categoria + " - " + total + " libros";
  } 
  else {
    texto = "Todas las categorías - " + total + " libros";
  }

  document.getElementById("contadorCategorias").textContent = texto;
}
function mostrarSkeletons(cantidad = 12, totalLibros = 0){
  const c = document.getElementById("catalogo");
  c.innerHTML = "";

  for(let i=0;i<cantidad;i++){
    const sk = document.createElement("div");
    sk.className = "producto skeleton";

    // 🔑 SOLO EL PRIMERO lleva spinner + texto
    if(i === 0){
  sk.innerHTML = `
    <div class="loading-box">
      <div class="spinner"></div>
      <div style="font-size:14px;color:#555;text-align:center;">
        Un momento… cargando <strong>más de 1000 títulos</strong>
      </div>
    </div>
    <div class="line"></div>
    <div class="line short"></div>
  `;
}else {
      sk.innerHTML = `
        <div class="img"></div>
        <div class="line"></div>
        <div class="line short"></div>
        <div class="line short"></div>
      `;
    }

    c.appendChild(sk);
  }
}
/* ================= FETCH JSON ================= */
// 🔥 mostrar skeleton INMEDIATAMENTE
mostrarSkeletons(12);

fetch("https://script.google.com/macros/s/AKfycby0I4zJSTM1bpWNB0QVpktidbyuXDzZFa1EjfZblZ0zwhkBrtAxYU45BQT88uHZhZYGPQ/exec")
  .then(r => r.json()) // 🔑 ESTE ERA EL ERROR
  .then(data => {

    const todos = data.libros || [];
    const totalReal = todos.length;

    // ✅ Mostrar skeleton + spinner
    mostrarSkeletons(12, totalReal);

    // ✅ Filtrar solo libros válidos
    libros = todos.filter(l =>
      l.autor && String(l.autor).trim() !== ""
    );

    // ⏳ permitir que se vea la animación
    setTimeout(() => {
      construirCategorias(libros);
      construirCatalogo(libros);
      inicializar();
const estado = obtenerEstadoDesdeURL();

viendoFavs = estado.favoritos;
document.getElementById("categoria").value = estado.categoria;

if (viendoFavs) {
  mostrarFavoritos();
} else {
  filtrar();
}

mostrarPagina(estado.pagina);

    }, 500);
  })
  .catch(err => {
    console.error("❌ Error cargando catálogo", err);
    alert("Error cargando el catálogo");
  });
   

/* ================= BUILD ================= */
function construirCategorias(libros){

  const sel = document.getElementById("categoria");

  sel.innerHTML = `
  <option value="">📂 Todas las categorías</option>
  <option value="pdf">📚 Digitales PDF</option>
  `;

  const categorias = [...new Set(libros.map(l => l.categoria).filter(Boolean))].sort();

  categorias.forEach(c => {

    const o = document.createElement("option");

    o.value = c;

    o.textContent = c;

    sel.appendChild(o);

  });

}
function construirCatalogo(libros){
  const c = document.getElementById("catalogo");
  c.innerHTML = "";

  todosLibros = []; // 🔑 resetear aquí

  const primeros = libros.slice(0, librosPorPagina);
  productosPendientes = libros.slice(librosPorPagina);

  primeros.forEach(L => {
    const prod = crearProducto(L);
    c.appendChild(prod);
    todosLibros.push(prod);
  });

  cargarEnSegundoPlano();
}
function crearProducto(L){
  const d = document.createElement("div");
  d.className = "producto";
  d.dataset.titulo = String(L.titulo || "").toLowerCase();
  d.dataset.autor  = String(L.autor  || "").toLowerCase();
  d.dataset.categoria = L.categoria || "";

  d.innerHTML = `
    <div class="estrella" onclick="toggleFav(this)">☆</div>
    <div class="stars-container"></div>

    <a href="https://wa.me/${numero}?text=${encodeURIComponent(
      "Hola! Me interesa " + L.titulo + " $" + L.precio
    )}" target="_blank" style="color:inherit;text-decoration:none">

      <img 
        src="${L.imagen}"
        loading="lazy"
        decoding="async"
        width="200"
        height="200"
      >

      <div class="titulo">${L.titulo}</div>
      <div class="autor">${L.autor}</div>

      <div class="precio">
        $${L.precio} MXN · 
        <span class="estado ${L.existencia > 0 ? 'ok' : 'no'}">
          ${L.existencia > 0 ? "✔ Disponible" : "✖ Agotado"}
        </span>
      </div>
    </a>
  `;

  return d;
}

function cargarEnSegundoPlano(){
  if(renderizando || productosPendientes.length === 0) return;
  renderizando = true;

  const cargar = () => {
    const c = document.getElementById("catalogo");
    let contador = 0;

    while(productosPendientes.length && contador < 10){
  const prod = crearProducto(productosPendientes.shift());
  prod.style.display = "none"; // 🔑 CLAVE
  c.appendChild(prod);
  todosLibros.push(prod);
  contador++;
}

    renderizando = false;

    if (productosPendientes.length) {
  if ("requestIdleCallback" in window) {
    requestIdleCallback(cargar);
  } else {
    setTimeout(cargar, 120);
  }
} else {
  // 🔑 cuando ya terminó TODO
  librosFiltrados = [...todosLibros];
  mostrarPagina(paginaActual);
}
  };

  cargar();
}

function inicializar(){
  librosFiltrados = [...todosLibros];
  favs = JSON.parse(localStorage.getItem("favoritosTertulia") || "[]");

  todosLibros.forEach(p => {
    const titulo = p.querySelector(".titulo").innerText;
    const estrella = p.querySelector(".estrella");

    if (favs.includes(titulo)) {
      estrella.textContent = "★";
      estrella.classList.add("act");
    }
  });

  mostrarPagina(1);
actualizarContadorCategorias();
}

  

/* ================= PAGINACIÓN ================= */
function mostrarPagina(p, conservarScroll = false){
  paginaActual = p;

  const totalPaginas = Math.ceil(librosFiltrados.length / librosPorPagina);
  if (paginaActual < 1) paginaActual = 1;
  if (paginaActual > totalPaginas) paginaActual = totalPaginas;

  todosLibros.forEach(x => x.style.display = "none");

  librosFiltrados
    .slice((paginaActual - 1) * librosPorPagina, paginaActual * librosPorPagina)
    .forEach(x => x.style.display = "block");

  document.getElementById("contadorPagina").textContent =
    "Página " + paginaActual + " / " + totalPaginas;

  actualizarContadorCategorias();

  if (!conservarScroll) {
    window.scrollTo({
      top: 0,
      behavior: "smooth"
    });
  }
}

function cambiarPagina(p){
  const totalPaginas = Math.ceil(librosFiltrados.length / librosPorPagina);
  if (p < 1 || p > totalPaginas) return;

  mostrarPagina(p);
  guardarEstadoEnURL();
}



/* ================= FILTROS ================= */

document.getElementById("buscador").oninput = filtrar;

document.getElementById("categoria").onchange = () => {

  const categoria = document.getElementById("categoria").value;

  // Si seleccionan la categoria PDF abrir catalogo digital
  if (categoria === "pdf") {
    window.open("digitales.html", "_blank");
    return;
  }

  actualizarURLCategoria(categoria);

  filtrar();
};

function filtrar(){

  const texto = normalizar(
    document.getElementById("buscador").value
  );

  const categoria = document.getElementById("categoria").value;

  viendoFavs = false;
 
// 🔥 volver a mostrar botón estrella
  document.getElementById("favoritosBtn").style.display = "flex";

  librosFiltrados = todosLibros.filter(p => {
    const titulo = normalizar(p.dataset.titulo || "");
    const autor  = normalizar(p.dataset.autor || "");
    const cat    = p.dataset.categoria || "";

    const coincideTexto =
      titulo.includes(texto) || autor.includes(texto);

    // 🔑 Si hay texto → ignora categoría
    if (texto.length > 0) {
      return coincideTexto;
    }

    // 🔑 Si no hay texto → usa categoría
    return !categoria || cat === categoria;
  });

  mostrarPagina(1);
actualizarContadorCategorias();
actualizarBotonValentin();
}

/* ================= FAVORITOS ================= */
  function actualizarBotonValentin() {
  const btn = document.getElementById("valentinBtn");

  if (
    viendoFavs &&
    favs.length > 0 &&
    librosFiltrados.length > 0
  ) {
    btn.style.display = "block";
  } else {
    btn.style.display = "none";
  }
}
function toggleFav(el){
  const producto = el.closest(".producto");
  const titulo = producto.querySelector(".titulo").innerText;

  if (favs.includes(titulo)) {
    // ❌ quitar favorito
    favs = favs.filter(t => t !== titulo);
    el.textContent = "☆";
    el.classList.remove("act");

    // si estamos viendo favoritos → quitar al instante
    if (viendoFavs) {
  mostrarFavoritos(); // 🔑 recalcula correctamente favoritos
}


  } else {
    // ⭐ agregar favorito
    favs.push(titulo);
    el.textContent = "★";
    el.classList.add("act");
    efectoEstrellas(el);
  }

  localStorage.setItem("favoritosTertulia", JSON.stringify(favs));

  // mostrar u ocultar botón Valentín
  actualizarBotonValentin();
}
 function efectoEstrellas(btn){
  const cont = btn.parentElement.querySelector(".stars-container");
  cont.innerHTML = "";

  const total = 12 + Math.floor(Math.random() * 4);

  for(let i=0;i<total;i++){
    const s = document.createElement("div");
    s.className = "tiny-star";

    const x1 = (Math.random()*30 - 15) + "px";
    const y1 = (Math.random()*30 - 15) + "px";
    const x2 = (Math.random()*60 - 30) + "px";
    const y2 = (Math.random()*60 - 30) + "px";

    s.style.setProperty("--x", x1);
    s.style.setProperty("--y", y1);
    s.style.setProperty("--x2", x2);
    s.style.setProperty("--y2", y2);

    cont.appendChild(s);
  }

  setTimeout(() => cont.innerHTML = "", 900);
}

function mostrarFavoritos(){
  viendoFavs = true;
// 🔥 ocultar botón flotante estrella
  document.getElementById("favoritosBtn").style.display = "none";

  librosFiltrados = todosLibros.filter(p =>
    favs.includes(p.querySelector(".titulo").innerText)
  );

  const btn = document.getElementById("valentinBtn");

  if (librosFiltrados.length > 0) {
    btn.style.display = "block";
  } else {
    btn.style.display = "none";
  }

  mostrarPagina(1);
  actualizarContadorCategorias();
  actualizarBotonValentin();
}

window.addEventListener("popstate", (event) => {

  const estado = obtenerEstadoDesdeURL();

  viendoFavs = estado.favoritos;
  document.getElementById("categoria").value = estado.categoria;

  if (viendoFavs) {
    mostrarFavoritos();
  } else {
    filtrar();
  }

  // 🔥 mostrar página normal
  mostrarPagina(estado.pagina);

  // 🔥 forzar scroll arriba
  window.scrollTo({
    top: 0,
    behavior: "auto"
  });
});



function enviarSolicitud(){

  if (!favs || favs.length === 0) {
    alert("Agrega libros a favoritos primero 📚");
    return;
  }

  const librosSeleccionados = todosLibros
    .filter(p => favs.includes(p.querySelector(".titulo").innerText))
    .map(p => {
      const titulo = p.querySelector(".titulo").innerText;
      const precio = p.querySelector(".precio").innerText.split("·")[0].trim();
      return "• " + titulo + " – " + precio;
    });

  const mensaje =
    "Hola 👋\n\n" +
    "Me interesan los siguientes libros:\n\n" +
    librosSeleccionados.join("\n") +
    "\n\n¿Me confirmas disponibilidad? 📚✨\n" +
    "Gracias.";

  window.open(
    "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje),
    "_blank"
  );
}

const mensajesPromo = [
  "🚚 Envíos a toda la República Mexicana",
  "🏠 Servicio a domicilio GRATIS en compras superiores a $200"
];

let indicePromo = 0;
const contenedorPromo = document.getElementById("mensajePromo");

contenedorPromo.textContent = mensajesPromo[0];

/* ===== AJUSTE DINÁMICO BARRA PROMO ===== */

function ajustarBarraPromo(){
  const barra = document.getElementById("barra");
  const promo = document.getElementById("barraPromo");

  if(!barra || !promo) return;

  const alturaBarra = barra.offsetHeight;

window.addEventListener("resize", ajustarBarraPromo);

/* =====================================
   CONTADOR SOCIAL DINÁMICO INTELIGENTE v3
   Más dinámico, realista y sin ceros
   México siempre líder
   ===================================== */

const paisesAmerica = [
  { nombre: "México", codigo: "mx" },
  { nombre: "Guatemala", codigo: "gt" },
  { nombre: "Estados Unidos", codigo: "us" },
  { nombre: "Colombia", codigo: "co" },
  { nombre: "Argentina", codigo: "ar" },
  { nombre: "Chile", codigo: "cl" },
  { nombre: "Perú", codigo: "pe" },
  { nombre: "El Salvador", codigo: "sv" }
];

/* -------- Nivel según hora -------- */

function nivelSegunHora() {
  const hora = new Date().getHours();

  if (hora >= 6 && hora < 12) {
    return { maxPaises: 2, maxVisitas: 3 };
  }
  if (hora >= 12 && hora < 18) {
    return { maxPaises: 3, maxVisitas: 6 };
  }
  if (hora >= 18 && hora < 23) {
    return { maxPaises: 4, maxVisitas: 12 };
  }

  return { maxPaises: 1, maxVisitas: 2 };
}

/* -------- Generar estado inicial -------- */

function generarEstadoInicial() {
  const hoy = new Date().toDateString();
  const nivel = nivelSegunHora();

  let cantidadPaises = Math.floor(Math.random() * nivel.maxPaises) + 1;

  let seleccionados = paisesAmerica
    .filter(p => p.nombre !== "México")
    .sort(() => 0.5 - Math.random())
    .slice(0, cantidadPaises - 1);

  seleccionados.unshift(paisesAmerica[0]);

  const mexicoBase = Math.floor(Math.random() * nivel.maxVisitas) + 1;

  const data = {
    fecha: hoy,
    paises: seleccionados.map(p => ({
      ...p,
      visitas: p.nombre === "México"
        ? Math.max(1, mexicoBase)
        : Math.max(1, Math.floor(Math.random() * mexicoBase))
    }))
  };

  localStorage.setItem("contadorSocial", JSON.stringify(data));
  return data;
}

/* -------- Obtener estado -------- */

function obtenerEstado() {
  const hoy = new Date().toDateString();
  let data = JSON.parse(localStorage.getItem("contadorSocial"));

  if (!data || data.fecha !== hoy) {
    return generarEstadoInicial();
  }

  // 🔥 LIMPIEZA ANTICEROS
  data.paises = data.paises.filter(p => p.visitas > 0);

  data.paises.forEach(p => {
    if (p.visitas < 1) p.visitas = 1;
  });

  // Garantizar México
  if (!data.paises.find(p => p.nombre === "México")) {
    data.paises.unshift({
      nombre: "México",
      codigo: "mx",
      visitas: 1
    });
  }

  localStorage.setItem("contadorSocial", JSON.stringify(data));
  return data;
}

/* -------- Actualizar cada 3 minutos -------- */

function actualizarEstado() {

  let data = obtenerEstado();
  const nivel = nivelSegunHora();

  // Garantizar México
  if (!data.paises.find(p => p.nombre === "México")) {
    data.paises.unshift({
      nombre: "México",
      codigo: "mx",
      visitas: 1
    });
  }

  const mexicoObj = data.paises.find(p => p.nombre === "México");

  // Ajustar visitas
  data.paises.forEach(p => {

    let cambio = Math.floor(Math.random() * 3) - 1; // -1,0,+1
    p.visitas += cambio;

    // Nunca 0
    if (p.visitas < 1) p.visitas = 1;

    if (p.nombre === "México") {

      // México sube un poco más dinámico
      p.visitas += Math.floor(Math.random() * 2);

      if (p.visitas > nivel.maxVisitas)
        p.visitas = nivel.maxVisitas;

    } else {

      // Nunca superar a México
      if (p.visitas >= mexicoObj.visitas) {
        p.visitas = Math.max(1, mexicoObj.visitas - 1);
      }
    }
  });

  /* ----- Movimiento de países ----- */

  if (Math.random() < 0.6) {  // más dinámico pero creíble

    // Agregar país
    if (data.paises.length < nivel.maxPaises && Math.random() < 0.6) {

      const disponibles = paisesAmerica.filter(p =>
        p.nombre !== "México" &&
        !data.paises.find(x => x.nombre === p.nombre)
      );

      if (disponibles.length > 0) {
        const nuevo = disponibles[Math.floor(Math.random() * disponibles.length)];
        data.paises.push({
          ...nuevo,
          visitas: 1
        });
      }

    } 
    // Quitar país (nunca México)
    else if (data.paises.length > 1 && Math.random() < 0.3) {

      data.paises = data.paises.filter(p =>
        p.nombre === "México" || Math.random() > 0.5
      );
    }
  }

  localStorage.setItem("contadorSocial", JSON.stringify(data));
  mostrarContador();
}

/* -------- Mostrar -------- */

function mostrarContador() {
  const data = obtenerEstado();
  data.paises = data.paises.filter(p => p.visitas > 0);
  const contenedor = document.getElementById("lista-usuarios");
  contenedor.innerHTML = "";

  const mapaBanderas = {
    "México": "🇲🇽",
    "Guatemala": "🇬🇹",
    "Estados Unidos": "🇺🇸",
    "Colombia": "🇨🇴",
    "Argentina": "🇦🇷",
    "Chile": "🇨🇱",
    "Perú": "🇵🇪",
    "El Salvador": "🇸🇻"
  };

  data.paises
    .sort((a,b) => b.visitas - a.visitas)
    .forEach(p => {

      contenedor.innerHTML += `
        <div style="
          display:flex;
          align-items:center;
          justify-content:space-between;
          padding:8px 12px;
          margin-bottom:6px;
          background:#f4f7ff;
          border-radius:10px;
        ">
          <div style="display:flex; align-items:center; gap:10px;">
            <span style="font-size:18px;">
              ${mapaBanderas[p.nombre] || ""}
            </span>
            <span style="font-weight:500;">
              ${p.nombre}
            </span>
          </div>

          <div style="
            font-weight:700;
            color:#0d47a1;
          ">
            ${p.visitas}
          </div>
        </div>
      `;
    });
}

/* -------- Inicializar -------- */

mostrarContador();
setInterval(actualizarEstado, 180000); // 3 minutos
</script>
